---
name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea for SparkyBot? We'd love to hear it! Please describe what you'd like to see.

  - type: dropdown
    id: area
    attributes:
      label: What area does this relate to?
      options:
        - Discord Reports (formatting, new sections, embeds)
        - Twitch Integration
        - AI Commentary (prompts, providers, output)
        - Display Options (new stats, tables, boons)
        - GUI / Settings
        - Auto-Updater
        - New Integration (DPS Reports, other services)
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      description: A clear description of what you'd like added or changed
      placeholder: I'd like SparkyBot to...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a frustration or limitation you've encountered?
      placeholder: Currently I have to...
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or seen this feature in other tools?
      placeholder: MzFightReporter does this by... / I've been working around it by...
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use regularly
        - Blocking my workflow
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, mockups, examples, or anything else
    validations:
      required: false
